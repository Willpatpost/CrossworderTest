<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CROSSWORDER</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="app-container">

        <!-- ================= HEADER ================= -->
        <header class="header-bar">
            <h1 class="app-title">CROSSWORDER</h1>
            <button 
                id="theme-toggle-button" 
                class="btn secondary-btn"
                type="button"
                aria-label="Toggle dark mode"
            >
                🌓 Toggle Theme
            </button>
        </header>

        <!-- ================= GRID SETTINGS ================= -->
        <section class="section settings-section">
            <h2>Grid Settings</h2>

            <div class="settings-controls">
                <div class="input-group">
                    <label for="rows-input">Rows</label>
                    <input
                        type="number"
                        id="rows-input"
                        name="rows-input"
                        min="5"
                        max="25"
                        value="15"
                    />
                </div>

                <div class="input-group">
                    <label for="columns-input">Columns</label>
                    <input
                        type="number"
                        id="columns-input"
                        name="columns-input"
                        min="5"
                        max="25"
                        value="15"
                    />
                </div>

                <button 
                    id="generate-grid-button" 
                    class="btn primary-btn"
                    type="button"
                >
                    Generate Grid
                </button>

                <fieldset class="toggle-group">
                    <legend>Options</legend>

                    <label class="toggle-container">
                        <input type="checkbox" id="allow-reuse-toggle" />
                        <span>Allow Word Reuse</span>
                    </label>

                    <label class="toggle-container">
                        <input type="checkbox" id="visualize-solve-toggle" checked />
                        <span>Visualize Solve</span>
                    </label>
                </fieldset>
            </div>
        </section>

        <!-- ================= WORD LOOKUP ================= -->
        <section class="section word-lookup-section">
            <h2>Word Lookup</h2>

            <div class="search-container">
                <input
                    type="text"
                    id="word-search-input"
                    placeholder="Search (use ? for wildcards, e.g. C??T)"
                    aria-label="Search words with wildcards"
                    autocomplete="off"
                />
                <div id="search-dropdown" class="search-dropdown"></div>
            </div>

            <div id="matches-count" class="matches-count"></div>
        </section>

        <!-- ================= PUZZLES ================= -->
        <section class="section puzzles-section">
            <h2>Puzzles & Archives</h2>

            <div class="button-group">
                <button id="load-easy-button" class="btn secondary-btn" type="button">Easy</button>
                <button id="load-medium-button" class="btn secondary-btn" type="button">Medium</button>
                <button id="load-hard-button" class="btn secondary-btn" type="button">Hard</button>

                <button 
                    id="random-puzzle-button" 
                    class="btn accent-btn"
                    type="button"
                >
                    Random Classic
                </button>
            </div>
        </section>

        <!-- ================= MODES ================= -->
        <section class="section mode-section">
            <h2>Editor & Play Controls</h2>

            <div class="mode-controls">

                <div class="mode-group">
                    <button id="drag-mode-button" class="btn mode-btn" type="button">Drag</button>
                    <button id="letter-entry-button" class="btn mode-btn" type="button">Letter</button>
                    <button id="number-entry-button" class="btn mode-btn" type="button">Number</button>
                </div>

                <div class="mode-group">
                    <button id="auto-number-button" class="btn secondary-btn" type="button">Auto Number</button>
                    <button id="symmetry-button" class="btn success-btn" type="button">Symmetry: ON</button>
                </div>

                <div class="mode-group">
                    <button 
                        id="play-mode-button" 
                        class="btn play-btn"
                        type="button"
                    >
                        Enter Play Mode
                    </button>
                </div>

            </div>

            <div id="mode-label" class="mode-label">
                Mode: Default (Toggle Black Squares)
            </div>
        </section>

        <!-- ================= MAIN CONTENT ================= -->
        <section class="section main-content">

            <!-- Status -->
            <div class="status-panel">
                <h3>Status</h3>

                <textarea 
                    id="status-display" 
                    readonly
                    aria-label="Solver status log"
                ></textarea>

                <div id="game-stats" class="game-stats hidden">
                    <strong>Progress:</strong>
                    <span id="solve-progress">0%</span>
                </div>
            </div>

            <!-- Grid -->
            <div 
                class="grid-container" 
                id="grid-container"
                aria-label="Crossword grid"
            ></div>

            <!-- Clues -->
            <div class="clues-panel">
                <div class="word-list">
                    <h3>Across</h3>
                    <div id="across-display" class="word-list-display"></div>
                </div>

                <div class="word-list">
                    <h3>Down</h3>
                    <div id="down-display" class="word-list-display"></div>
                </div>
            </div>

        </section>

        <!-- ================= SOLVER CONTROLS ================= -->
        <section class="section controls-section">

            <button 
                id="solve-crossword-button" 
                class="btn solve-btn"
                type="button"
            >
                Solve & Generate Clues
            </button>

            <button 
                id="cancel-solve-button" 
                class="btn danger-btn hidden"
                type="button"
            >
                Cancel Solve
            </button>

            <div id="play-controls" class="play-controls hidden">
                <button id="check-grid-button" class="btn secondary-btn" type="button">Check</button>
                <button id="reveal-word-button" class="btn secondary-btn" type="button">Reveal Word</button>
                <button id="reveal-puzzle-button" class="btn danger-btn" type="button">Reveal All</button>
            </div>

        </section>

        <!-- ================= FOOTER ================= -->
        <footer class="footer">
            <p>© Willpatpost CROSSWORDER</p>
        </footer>

    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
