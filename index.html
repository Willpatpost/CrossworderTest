<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Crossword Generator</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="main-container">
        <header>
            <h1>Custom Crossword Generator</h1>
        </header>

        <section class="settings-section">
            <h2>Settings</h2>
            <div class="settings-controls">
                <label for="rows-input">Rows:</label>
                <input
                    type="number"
                    id="rows-input"
                    name="rows-input"
                    min="5"
                    max="20"
                    value="10"
                />

                <label for="columns-input">Columns:</label>
                <input
                    type="number"
                    id="columns-input"
                    name="columns-input"
                    min="5"
                    max="20"
                    value="10"
                />

                <button id="generate-grid-button" class="btn primary-btn">
                    Generate Grid
                </button>

                <div class="toggle-container">
                    <input type="checkbox" id="allow-reuse-toggle" name="allow-reuse-toggle" />
                    <label for="allow-reuse-toggle">Allow Word Reuse</label>
                </div>
            </div>
        </section>

        <section class="word-lookup-section">
            <h2>Word Lookup</h2>
            <div class="search-container">
                <input
                    type="text"
                    id="word-search-input"
                    placeholder="Search for a word..."
                    aria-label="Word Search Input"
                />
                <div id="search-dropdown"></div>
                <div id="matches-count"></div>
            </div>
        </section>

        <section class="predefined-puzzles-section">
            <h2>Predefined Puzzles</h2>
            <div class="predefined-puzzles-controls">
                <button id="load-easy-button" class="btn secondary-btn">
                    Load Easy Puzzle
                </button>
                <button id="load-medium-button" class="btn secondary-btn">
                    Load Medium Puzzle
                </button>
                <button id="load-hard-button" class="btn secondary-btn">
                    Load Hard Puzzle
                </button>
            </div>
        </section>

        <section class="mode-controls-section">
            <h2>Mode Controls</h2>
            <div class="mode-controls">
                <button id="number-entry-button" class="btn mode-btn">
                    Number Entry Mode
                </button>
                <button id="auto-number-button" class="btn secondary-btn">
                    Auto Number
                </button>

                <button id="letter-entry-button" class="btn mode-btn">
                    Letter Entry Mode
                </button>
                <button id="drag-mode-button" class="btn mode-btn">
                    Drag Mode
                </button>
            </div>
            <div id="mode-label" class="mode-label">Mode: Default</div>
        </section>

        <section class="middle-content-section">
            <div class="status-display-container">
                <h3>Status</h3>
                <textarea id="status-display" readonly></textarea>
            </div>

            <div class="grid-container" id="grid-container">
                </div>

            <div class="word-lists-container">
                <div class="word-list">
                    <h3>Across</h3>
                    <div id="across-display" class="word-list-display"></div>
                </div>
                <div class="word-list">
                    <h3>Down</h3>
                    <div id="down-display" class="word-list-display"></div>
                </div>
            </div>
        </section>

        <section class="controls-section">
            <button id="solve-crossword-button" class="btn solve-btn">
                Solve Crossword
            </button>
        </section>

        <footer>
            <p>© William Poston Crossword Generator</p>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
